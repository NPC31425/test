<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Integrity 触发器</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f0f0f0; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .status { padding: 10px; margin: 10px 0; border-radius: 6px; font-weight: bold; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        button { width: 100%; padding: 15px; font-size: 16px; background: #007bff; color: white; border: none; border-radius: 8px; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>测试 Media Integrity 链路</h2>
        <div id="apiStatus" class="status">正在检测 API...</div>
        <button id="triggerBtn">🚀 发射 Mojo 请求</button>
        <p style="font-size: 12px; color: #666; margin-top: 15px;">
            注：点击按钮会通过 window.androidWebView 将 IPC 请求直接砸进 Java 层的 AwMediaIntegrityServiceImpl。
        </p>
    </div>

    <script>
        const statusDiv = document.getElementById('apiStatus');
        const btn = document.getElementById('triggerBtn');

        // 1. 检查 API 是否存在
        const hasApi = window.androidWebView && typeof window.androidWebView.getMediaIntegrityProvider === 'function';

        if (hasApi) {
            statusDiv.innerText = "✅ 已发现 API，随时可以触发";
            statusDiv.className = "status success";
        } else {
            statusDiv.innerText = "❌ 未找到 window.androidWebView.getMediaIntegrityProvider";
            statusDiv.className = "status error";
        }

        // 2. 绑定点击事件触发 IPC
        btn.onclick = function() {
            if (!hasApi) {
                alert("API 不存在，无法发送请求！");
                return;
            }

            console.log("准备调用 getMediaIntegrityProvider...");
            
            // 传入任意数字作为 cloudProjectNumber
            window.androidWebView.getMediaIntegrityProvider({
                cloudProjectNumber: 123456789 
            }).then(result => {
                console.log("Java 层处理成功:", result);
                alert("Java 层已响应！请查看 Logcat 中的日志。");
            }).catch(err => {
                // 即便这里报错（因为项目号不对），Java 层代码也已经执行过了
                console.error("Java 层已处理但返回错误:", err);
                alert("请求已到达 Java 层，请检查 Logcat。");
            });
        };
    </script>
</body>
</html>
