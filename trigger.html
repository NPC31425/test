<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Media Integrity 链路验证</title>
</head>
<body style="background: #f5f5f7; text-align: center; padding-top: 100px; font-family: sans-serif;">
    <h2>Media Integrity 接口唤醒测试</h2>
    <p>当前 API 状态：<span id="status" style="font-weight: bold; color: red;">检测中...</span></p>
    <br>
    <button id="btn" style="padding: 15px 30px; font-size: 16px; background: #007AFF; color: white; border: none; border-radius: 8px;">
        🎯 发射单次真实请求
    </button>

    <script>
        const statusEl = document.getElementById('status');
        const btn = document.getElementById('btn');

        // 1. 检查 API 是否存在
        if (navigator.getMediaIntegrityProvider) {
            statusEl.innerText = "已激活 (Available)";
            statusEl.style.color = "green";
        } else {
            statusEl.innerText = "未激活 (Undefined) ❌ 必须去内核开启 Flag！";
        }

        // 2. 点击手动触发
        btn.onclick = function() {
            if (!navigator.getMediaIntegrityProvider) {
                alert("API 根本不存在，请求无法送达 Java 层！");
                return;
            }
            
            navigator.getMediaIntegrityProvider({
                cloudProjectNumber: "123456789"
            }).then(() => {
                alert("请求成功（已走完 Java 完整链路）");
            }).catch((err) => {
                alert("请求已送达 Java 内部，但因测试 ID 报错（这是正常的，链路已通）");
            });
        };
    </script>
</body>
</html>
