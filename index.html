<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Media Integrity 崩溃测试入口</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="text-align: center; padding-top: 50px; font-family: sans-serif; background: #f5f5f7;">
    <h2>Media Integrity 稳定性压测</h2>
    
    <!-- 增加一个状态提示框 -->
    <div id="env-check" style="margin: 20px auto; padding: 15px; max-width: 400px; border-radius: 8px; font-weight: bold;">
        正在检测浏览器环境...
    </div>

    <button id="start-btn" onclick="startTest()" disabled style="padding: 15px 30px; font-size: 18px; background: #999; color: white; border: none; border-radius: 8px; cursor: not-allowed;">
        🚀 开始一键压测
    </button>

    <script>
        window.onload = function() {
            const checkDiv = document.getElementById('env-check');
            const btn = document.getElementById('start-btn');
            
            // 检查当前内置浏览器是否带有这个高危 API
            if (window.navigator && window.navigator.getWebViewMediaIntegrityTokenProvider) {
                checkDiv.style.background = "#d4edda";
                checkDiv.style.color = "#155724";
                checkDiv.innerHTML = "✓ 环境支持：当前浏览器已启用 Media Integrity API";
                btn.disabled = false;
                btn.style.background = "#007AFF";
                btn.style.cursor = "pointer";
            } else {
                checkDiv.style.background = "#fff3cd";
                checkDiv.style.color = "#856404";
                checkDiv.innerHTML = "⚠️ 环境警告：当前浏览器未启用或不支持该 API，测试可能无法引发崩溃。";
                // 依然允许点击，以防某些魔改版本隐藏了外层对象
                btn.disabled = false;
                btn.style.background = "#ff9500";
                btn.style.cursor = "pointer";
            }
        };

        function startTest() {
            window.open('trigger.html', '_blank');
        }
    </script>
</body>
</html>
