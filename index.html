        body { font-family: sans-serif; background: #121212; color: #fff; text-align: center; padding-top: 100px; }
        .btn { padding: 15px 35px; font-size: 16px; background: #007AFF; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }

</head>
